events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # Buffering
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;

    # WebSocket support map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Upstream definitions
    upstream dashboard_http {
        server dashboard:3069;
    }

    upstream dashboard_ws {
        server dashboard:3070;
    }

    upstream jellyfin {
        server jellyfin:8096;
    }

    upstream nextcloud {
        server nextcloud:80;
    }

    upstream collabora {
        server collabora:9980;
    }

    upstream theia {
        server theia:3000;
    }

    upstream matrix_synapse {
        server synapse:8008;
    }

    upstream element {
        server element:80;
    }

    upstream vaultwarden {
        server vaultwarden:80;
    }

    upstream open_webui {
        server open-webui:8080;
    }

    upstream kiwix {
        server kiwix:8080;
    }

    upstream kiwix_manager {
        server kiwix-manager:80;
    }

    upstream openvpn_ui {
        server openvpn-ui:8080;
    }

    # ──────────────────────────────────────────────
    # Dashboard — primary entry point (port 80)
    # ──────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://dashboard_http;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket for dashboard terminal (WS on :3070)
        # Clients connect to ws://<host>/ws-terminal via the dashboard frontend
        location /ws-terminal {
            proxy_pass http://dashboard_ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
        }

        # Healthcheck
        location /nginx-health {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }
    }

    # ──────────────────────────────────────────────
    # Jellyfin — media server (port 8096)
    # ──────────────────────────────────────────────
    server {
        listen 8096;

        location / {
            proxy_pass http://jellyfin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
            add_header Content-Security-Policy "frame-ancestors 'self' http://localhost:3069;" always;
            add_header X-Frame-Options "ALLOW-FROM http://localhost:3069" always;
        }
    }

    # ──────────────────────────────────────────────
    # Nextcloud — productivity suite (port 8081)
    # ──────────────────────────────────────────────
    server {
        listen 8081;
        client_max_body_size 0;  # Nextcloud handles file sizes internally

        location / {
            proxy_pass http://nextcloud;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Frame-Options "SAMEORIGIN";
            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
            add_header Content-Security-Policy "frame-ancestors 'self' http://localhost:3069;" always;
        }

        # DAV support for Nextcloud sync clients
        location /.well-known/carddav {
            return 301 $scheme://$host/remote.php/dav;
        }
        location /.well-known/caldav {
            return 301 $scheme://$host/remote.php/dav;
        }
    }

    # ──────────────────────────────────────────────
    # Collabora Online — document editing (port 9980)
    # ──────────────────────────────────────────────
    server {
        listen 9980;

        location / {
            proxy_pass http://collabora;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support for Collabora
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Buffering off for real-time editing
            proxy_buffering off;
            proxy_read_timeout 3600s;
        }
    }

    # ──────────────────────────────────────────────
    # Theia IDE — browser-based IDE (port 3030)
    # ──────────────────────────────────────────────
    server {
        listen 3030;

        location / {
            proxy_pass http://theia;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (Theia uses WS for language server)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400s;
        }
    }

    # ──────────────────────────────────────────────
    # Matrix Synapse — chat server (port 8008)
    # ──────────────────────────────────────────────
    server {
        listen 8008;

        location / {
            proxy_pass http://matrix_synapse;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support for Matrix (client-server long-polling fallback)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

    # ──────────────────────────────────────────────
    # Element — Matrix web client (port 8082)
    # ──────────────────────────────────────────────
    server {
        listen 8082;

        location / {
            proxy_pass http://element;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
            add_header Content-Security-Policy "frame-ancestors 'self' http://localhost:3069;" always;
        }
    }

    # ──────────────────────────────────────────────
    # Vaultwarden — password manager (port 8083)
    # ──────────────────────────────────────────────
    server {
        listen 8083;

        location / {
            proxy_pass http://vaultwarden;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket for notifications
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
            add_header Content-Security-Policy "frame-ancestors 'self' http://localhost:3069;" always;
            add_header X-Frame-Options "ALLOW-FROM http://localhost:3069" always;
        }

        # Vaultwarden notifications WebSocket
        location /notifications/hub {
            proxy_pass http://vaultwarden;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

    # ──────────────────────────────────────────────
    # Open-WebUI — AI chat (port 8085)
    # ──────────────────────────────────────────────
    server {
        listen 8085;

        location / {
            proxy_pass http://open_webui;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support for streaming responses
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400s;
        }
    }

    # ──────────────────────────────────────────────
    # Kiwix Reader — offline knowledge (port 8087)
    # ──────────────────────────────────────────────
    server {
        listen 8087;

        location / {
            proxy_pass http://kiwix;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ──────────────────────────────────────────────
    # Kiwix Manager — ZIM file browser (port 8086)
    # ──────────────────────────────────────────────
    server {
        listen 8086;

        location / {
            proxy_pass http://kiwix_manager;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ──────────────────────────────────────────────
    # OpenVPN UI — VPN management (port 8090)
    # ──────────────────────────────────────────────
    server {
        listen 8090;

        location / {
            proxy_pass http://openvpn_ui;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
